<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Portfolio of Van Sy, AI Engineer">
  <title>Van Sy — AI Engineer</title>

  <!-- Prevent theme flash -->
  <script>
    (function() {
      var t = localStorage.getItem('theme') ||
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.dataset.theme = t;
    })();
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Favicon -->
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">

  <!-- Styles -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <!-- Dot background canvas -->
  <canvas id="dot-bg"></canvas>

  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="#" class="nav-brand">Van Sy</a>

      <button id="nav-menu-btn" class="nav-menu-btn" aria-label="Toggle menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>

      <ul id="nav-links" class="nav-links">
        <li><a href="#" class="tab-link active" data-tab="portfolio">Portfolio</a></li>
        <li><a href="#" class="tab-link" data-tab="blog">Blog</a></li>
        <li><button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme"></button></li>
      </ul>
    </div>
  </nav>

  <!-- Table of Contents (portfolio) -->
  <aside id="toc" class="toc">
    <ul class="toc-list" id="toc-portfolio">
      <li><a href="#section-welcome" class="toc-dash active" data-section="section-welcome">Welcome</a></li>
      <li><a href="#section-about" class="toc-dash" data-section="section-about">About</a></li>
      <li><a href="#section-experience" class="toc-dash" data-section="section-experience">Experience</a></li>
      <li><a href="#section-projects" class="toc-dash" data-section="section-projects">Projects</a></li>
      <li><a href="#section-skills" class="toc-dash" data-section="section-skills">Skills</a></li>
    </ul>
    <ul class="toc-list" id="toc-blog" style="display:none;">
    </ul>
  </aside>

  <!-- Tab: Portfolio -->
  <main id="tab-portfolio" class="tab-content active">
    <section id="section-welcome" class="section welcome">
      <div class="welcome-inner">
        <div id="terminal" class="terminal">
          <div class="terminal-titlebar">
            <span class="terminal-dot dot-red"></span>
            <span class="terminal-dot dot-yellow"></span>
            <span class="terminal-dot dot-green"></span>
            <span class="terminal-title">vansy@portfolio ~ </span>
          </div>
          <div id="terminal-body" class="terminal-body"><span id="terminal-cursor" class="terminal-cursor">█</span></div>
        </div>
        <div class="welcome-prompt">scroll to enter<span class="blink">_</span></div>
      </div>
    </section>

    <section id="section-about" class="section hero">
      <div class="section-inner"></div>
    </section>

    <section id="section-experience" class="section">
      <div class="section-inner"></div>
    </section>

    <section id="section-projects" class="section">
      <div class="section-inner"></div>
    </section>

    <section id="section-skills" class="section">
      <div class="section-inner"></div>
    </section>
  </main>

  <!-- Tab: Blog -->
  <main id="tab-blog" class="tab-content" style="display:none;">
    <section class="section" style="display:flex;align-items:center;justify-content:center;">
      <div class="section-inner" style="text-align:center;">
        <h2 class="section-title" style="display:block;text-align:center;">Blog</h2>
        <p style="color:var(--text-secondary);font-size:0.9rem;margin-top:1rem;">Coming soon.</p>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; 2026 Van Sy. All rights reserved.</p>
  </footer>

  <!-- Scripts -->
  <script src="js/lib/js-yaml.min.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/dots.js"></script>
  <script src="js/terminal.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
